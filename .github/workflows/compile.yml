name: compile
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions:
  contents: read
  packages: read
jobs:
  compile:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/rwth-i6/rasr:build
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v2
      with:
        path: "rasr"
    - name: Compile RASR
      run: |
        cd rasr
        cmake -S . -B build
        cmake --build build -j4
