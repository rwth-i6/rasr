name: compile
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions:
  contents: read
  packages: read
jobs:
  compile:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/rwth-i6/rasr:build
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v2
      with:
        path: "rasr"
    - name: Compile RASR
      run: |
        cd rasr
        cmake -S . -B build
        cmake --build build -j4
    - name: Build Python package
      run: |
        cd rasr
        python3 -m pip install --upgrade pip setuptools wheel
        CMAKE_BUILD_DIR=build python3 -m pip install . --verbose --no-build-isolation
    - name: Import Python package
      run: |
        python3 -c "import librasr; print(librasr.__name__)"
